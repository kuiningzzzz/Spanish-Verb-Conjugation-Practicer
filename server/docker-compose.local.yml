services:
  spanish-verb-api:
    ports:
      - "3000:3000"

  admin-web-dev:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run serve -- --host 0.0.0.0 --port 8080"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - VUE_APP_ADMIN_PROXY_TARGET=http://spanish-verb-api:3000
    volumes:
      - ../admin-web:/app
      - admin_web_node_modules:/app/node_modules
    ports:
      - "8080:8080"
    depends_on:
      - spanish-verb-api
    networks:
      - spanish-verb-network

volumes:
  admin_web_node_modules:
